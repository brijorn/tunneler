name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            ext: .exe
          - os: darwin
            arch: arm64
            ext: ""
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: false

    - name: Extract Version
      id: get_version
      run: |
        VERSION=$(grep 'const Version =' main.go | cut -d '"' -f 2)
        echo "version=$VERSION" >> $GITHUB_ENV

    - name: Build Binary
      run: |
        GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o tunneler-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} main.go

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tunneler-${{ matrix.os }}-${{ matrix.arch }}
        path: tunneler-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(grep 'const Version =' main.go | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.version }}
          name: ${{ env.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
